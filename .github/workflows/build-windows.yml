name: Windows Build (Stage 1 Verification)

on:
  push:
    branches: [ master, main, feature/* ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup vcpkg and install dependencies
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
        .\vcpkg\vcpkg install qtbase:x64-windows qttools:x64-windows openssl:x64-windows gtest:x64-windows
      shell: cmd
      env:
        VCPKG_DEFAULT_TRIPLET: x64-windows

    - name: Configure CMake
      run: |
        cmake -B build -S . `
          -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake `
          -DVCPKG_TARGET_TRIPLET=x64-windows
      shell: pwsh

    - name: Build
      run: cmake --build build --config Release -j
      shell: pwsh

    - name: Run basic smoke test
      run: |
        if (Test-Path "build\src\apps\deskflow-core\Release\deskflow-core.exe") {
          Write-Host "✓ deskflow-core.exe built successfully"
          & build\src\apps\deskflow-core\Release\deskflow-core.exe --help
        } else {
          Write-Error "deskflow-core.exe not found"
          exit 1
        }
      shell: pwsh

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: deskflow-windows-stage1
        path: |
          build/src/apps/deskflow-core/Release/*.exe
          build/src/apps/deskflow-gui/Release/*.exe
        retention-days: 7
