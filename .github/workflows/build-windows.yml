name: Windows Build (Stage 1 Verification)

on:
  push:
    branches: [ master, main, feature/* ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install Qt via aqtinstall
      run: |
        python -m pip install aqtinstall
        python -m aqt install-qt windows desktop 6.7.0 win64_msvc2019_64
      shell: pwsh

    - name: Setup vcpkg and install dependencies (excluding Qt)
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
        .\vcpkg\vcpkg install openssl:x64-windows gtest:x64-windows
      shell: cmd
      env:
        VCPKG_DEFAULT_TRIPLET: x64-windows

    - name: Configure CMake
      run: |
        $env:CMAKE_PREFIX_PATH = "${{ github.workspace }}\6.7.0\msvc2019_64"
        cmake -B build -S . `
          -G "Ninja" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake `
          -DVCPKG_TARGET_TRIPLET=x64-windows
      shell: pwsh

    - name: Build
      run: |
        cmake --build build --config Release --target deskflow-core -j
      shell: pwsh

    - name: Run basic smoke test
      run: |
        if (Test-Path "build\bin\deskflow-core.exe") {
          Write-Host "✓ deskflow-core.exe built successfully"
          & build\bin\deskflow-core.exe --version
        } else {
          Write-Error "deskflow-core.exe not found"
          exit 1
        }
      shell: pwsh

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: deskflow-windows-stage1
        path: |
          build/bin/deskflow-core.exe
        retention-days: 7
